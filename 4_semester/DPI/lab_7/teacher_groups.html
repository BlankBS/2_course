<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mobile Teacher: Group Management</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            width: 375px;
            padding-bottom: 110px; /* Место под кнопку и меню */
        }

        header {
            padding: 20px 16px 10px;
        }

        .title { font-size: 20px; font-weight: 800; }
        .subtitle { font-size: 13px; color: #888; margin-top: 4px; }

        /* Сводка по группе */
        .summary-stats {
            display: flex;
            gap: 10px;
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: #FAFAFA;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }
        .stat-val { font-size: 18px; font-weight: 800; display: block; }
        .stat-lab { font-size: 9px; color: #AAA; text-transform: uppercase; }

        /* Список студентов и оценок */
        .journal-container { padding: 0 16px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title { font-size: 14px; font-weight: 700; }

        .student-grade-card {
            background: #FFF;
            border: 1px solid #F0F0F0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .student-name { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: block; }

        .grades-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .grade-input-box {
            flex: 1;
            text-align: center;
        }

        .input-label { font-size: 9px; color: #AAA; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        .input-field {
            width: 100%;
            height: 40px;
            background: #F9F9F9;
            border: 1.5px solid #E0E0E0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }

        .final-grade { background: #333; color: #FFF; border-color: #333; }

        /* Кнопка сохранения */
        .btn-save {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: #000;
            color: #FFF;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Таб бар */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 375px;
            height: 65px;
            background: #FFF;
            border-top: 1px solid #EEE;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #999; }
        .tab-active { color: #000; font-weight: 700; }
        .tab-icon { width: 22px; height: 22px; background: #EEE; border-radius: 5px; margin-bottom: 4px; }
        .tab-active .tab-icon { background: #000; }
    </style>
</head>
<body>

    <header>
        <div class="title">Группа 22-Т-104</div>
        <div class="subtitle">Дисциплина: Высшая математика</div>
    </header>

    <!-- Сводка -->
    <div class="summary-stats">
        <div class="stat-card">
            <span class="stat-val">30</span>
            <span class="stat-lab">Студентов</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">4.2</span>
            <span class="stat-lab">Ср. балл</span>
        </div>
        <div class="stat-card">
            <span class="stat-val">12</span>
            <span class="stat-lab">Должников</span>
        </div>
    </div>

    <!-- Список -->
    <div class="journal-container">
        <div class="section-header">
            <span class="section-title">Журнал оценивания</span>
        </div>

        <!-- Студент 1 -->
        <div class="student-grade-card">
            <span class="student-name">Абрамов Сергей Александрович</span>
            <div class="grades-row">
                <div class="grade-input-box">
                    <span class="input-label">Тест 1</span>
                    <div class="input-field">8</div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Лаб 1</span>
                    <div class="input-field">9</div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Лаб 2</span>
                    <div class="input-field"></div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Итог</span>
                    <div class="input-field final-grade">8.5</div>
                </div>
            </div>
        </div>

        <!-- Студент 2 -->
        <div class="student-grade-card">
            <span class="student-name">Борисов Дмитрий Игоревич</span>
            <div class="grades-row">
                <div class="grade-input-box">
                    <span class="input-label">Тест 1</span>
                    <div class="input-field">7</div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Лаб 1</span>
                    <div class="input-field">6</div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Лаб 2</span>
                    <div class="input-field"></div>
                </div>
                <div class="grade-input-box">
                    <span class="input-label">Итог</span>
                    <div class="input-field final-grade">6.5</div>
                </div>
            </div>
        </div>
    </div>

    <div class="btn-save">Сохранить баллы</div>

    <nav class="tab-bar">
        <div class="tab-item tab-active"><div class="tab-icon"></div>Группы</div>
        <div class="tab-item"><div class="tab-icon"></div>Расписание</div>
        <div class="tab-item"><div class="tab-icon"></div>Ведомости</div>
        <div class="tab-item"><div class="tab-icon"></div>Выход</div>
    </nav>

</body>
</html>
