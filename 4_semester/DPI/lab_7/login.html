<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mobile Login: Academic System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #FFFFFF;
            width: 375px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
        }

        /* Контейнер (Карточка на мобилках становится почти на весь экран) */
        .login-container {
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .card {
            border: 1px solid #EAEAEA;
            border-radius: 16px;
            padding: 32px 20px;
            background: #FFFFFF;
            text-align: center;
        }

        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 24px;
            background-image: url('https://i.ibb.co/hR0VfH0/logo.png'); /* Замени на свой путь, если нужно */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Поля ввода */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }

        .input-field {
            width: 100%;
            height: 48px;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            padding: 0 16px;
            box-sizing: border-box;
            font-size: 14px;
            color: #333;
            background: #FAFAFA;
        }

        /* Кнопки входа */
        .btn-stack {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            height: 50px;
            background: #000;
            color: #FFF;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ссылки-помощники */
        .helper-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 11px;
            color: #888;
        }

        .copyright {
            margin-top: 40px;
            font-size: 10px;
            color: #BBB;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card">
            <div class="logo"></div>
            <h1>Вход в систему</h1>
            <p class="subtitle">Используйте данные, выданные в деканате</p>

            <div class="input-group">
                <label>Логин или номер билета</label>
                <div class="input-field" style="display: flex; align-items: center; color: #BBB;">Например: 111111111</div>
            </div>

            <div class="input-group">
                <label>Пароль</label>
                <div class="input-field" style="display: flex; align-items: center; color: #BBB;">••••••••••••</div>
            </div>

            <div class="btn">Войти в экосистему (студент)</div>

            <div class="helper-links">
                <span>Забыли пароль?</span>
                <span>Техподдержка</span>
            </div>
        </div>

        <div class="copyright">UniStudy © 2026</div>
    </div>

</body>
</html>
