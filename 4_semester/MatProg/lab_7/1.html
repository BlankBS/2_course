<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DFS Visualization Variant 13 - Fixed</title>
    <style>
        body { background-color: #333; color: white; font-family: sans-serif; padding: 20px; }
        .frame-container { display: flex; flex-direction: column; gap: 50px; align-items: center; }
        
        .canvas { 
            position: relative; 
            width: 950px; /* Увеличили ширину */
            height: 500px; 
            background-color: #cccccc; border: 3px solid #111;
            color: black; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 32px; font-weight: bold; }
        
        .node {
            position: absolute; width: 55px; height: 55px;
            border-radius: 50%; border: 3px solid black;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; z-index: 2;
        }
        .node.W { background-color: white; }
        .node.G { background-color: #888; }
        .node.B { background-color: #333; color: white; }

        .tables { position: absolute; left: 20px; top: 100px; display: flex; flex-direction: column; gap: 10px; z-index: 3; }
        .row { display: flex; align-items: center; gap: 5px; }
        .label { color: green; font-size: 24px; font-weight: bold; width: 30px; }
        .cell { 
            width: 32px; height: 32px; border: 2px solid black; background: white;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }

        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

<div class="frame-container" id="main"></div>

<script>
    // Сдвинули все координаты на +120 по горизонтали (X), чтобы не наезжать на таблицу
    const nodesPos = {
        0: [470, 50], 
        1: [720, 50], 
        3: [570, 220], 
        2: [270, 220], // Теперь вершина 2 не касается таблицы
        5: [370, 400], 
        6: [670, 400], 
        4: [820, 220]
    };
    const edges = [[0,1],[0,3],[3,2],[3,5],[3,6],[5,2],[5,6],[6,4],[4,1]];

    const frames = [
        { 
            title: "DFS - Старт (Вершина 0)", 
            c: ["G","W","W","W","W","W","W"], 
            d: [1,"/","/","/","/","/","/"], 
            f: ["/","/","/","/","/","/","/"],
            p: ["N","N","N","N","N","N","N"] 
        },
        { 
            title: "Шаг 2: Идем в 1, затем закрываем (Тупик)", 
            c: ["G","B","W","W","W","W","W"], 
            d: [1,2,"/","/","/","/","/"], 
            f: ["/",3,"/","/","/","/","/"],
            p: ["N",0,"N","N","N","N","N"] 
        },
        { 
            title: "Шаг 3: Переход в 3, затем в 2 и закрываем 2", 
            c: ["G","B","B","G","W","W","W"], 
            d: [1,2,5,4,"/","/","/"], 
            f: ["/",3,6,"/","/","/","/"],
            p: ["N",0,3,0,"N","N","N"] 
        },
        { 
            title: "Шаг 4: Погружение: 3 -> 5 -> 6 -> 4", 
            c: ["G","B","B","G","G","G","G"], 
            d: [1,2,5,4,9,7,8], 
            f: ["/",3,6,"/","/","/","/"],
            p: ["N",0,3,0,6,3,5] 
        },
        { 
            title: "Шаг 5: Закрываем 4, затем 6, затем 5", 
            c: ["G","B","B","G","B","B","B"], 
            d: [1,2,5,4,9,7,8], 
            f: ["/",3,6,"/",10,12,11],
            p: ["N",0,3,0,6,3,5] 
        },
        { 
            title: "Финиш: Закрываем 3 и 0", 
            c: ["B","B","B","B","B","B","B"], 
            d: [1,2,5,4,9,7,8], 
            f: [14,3,6,13,10,12,11],
            p: ["N",0,3,0,6,3,5] 
        }
    ];

    function createFrame(data) {
        const wrap = document.createElement('div');
        wrap.className = 'canvas';
        
        let html = `<div class="header">${data.title}</div>`;
        
        // Tables
        html += `<div class="tables">`;
        [['C', data.c], ['d', data.d], ['f', data.f], ['P', data.p]].forEach(row => {
            html += `<div class="row"><div class="label">${row[0]}</div>`;
            row[1].forEach(val => html += `<div class="cell">${val}</div>`);
            html += `</div>`;
        });
        html += `</div>`;

        // SVG Edges
        html += `<svg><defs><marker id="arr" markerWidth="10" markerHeight="7" refX="27" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="black" /></marker></defs>`;
        edges.forEach(e => {
            const [x1, y1] = nodesPos[e[0]];
            const [x2, y2] = nodesPos[e[1]];
            // Центрируем линию (радиус 55/2 = 27.5)
            html += `<line x1="${x1+28}" y1="${y1+28}" x2="${x2+28}" y2="${y2+28}" stroke="black" stroke-width="2" marker-end="url(#arr)" />`;
        });
        html += `</svg>`;

        // Nodes
        for(let i=0; i<7; i++) {
            const [x, y] = nodesPos[i];
            html += `<div class="node ${data.c[i]}" style="left:${x}px; top:${y}px">${i}</div>`;
        }

        wrap.innerHTML = html;
        return wrap;
    }

    const main = document.getElementById('main');
    frames.forEach(f => main.appendChild(createFrame(f)));
</script>

</body>
</html>
